spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/library?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 30000

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

app:
  jwt:
    secret: ${JWT_SECRET:}

logging:
  level:
    com.library: info
