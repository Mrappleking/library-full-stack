server:
  port: 8080

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  task:
    scheduling:
      pool:
        size: 1

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.library.entity
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

app:
  jwt:
    expiration-ms: 86400000  # 24h
  cache:
    book-ttl-seconds: 300
    user-ttl-seconds: 300
    rule-ttl-seconds: 3600
  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-period-seconds: 60
  hold:
    max-holds-per-reader: 3
  security:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5175
      - http://localhost:5177
      - http://127.0.0.1:5173
      - http://127.0.0.1:5175
      - http://127.0.0.1:5177
    public-paths:
      - /api/auth/login
      - /api/auth/register
      - /api/health
    reader-public-paths:
      - /api/facets
      - /api/books
      - /api/categories
      - /api/rules
      - /api/holds/count
